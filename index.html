<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>CritiCo | Bespoke Software & AI Engineering for High-Growth Teams</title>
    <meta name="description" content="CritiCo builds high-performance custom software and intelligent AI systems for scaling businesses. Process automation, bespoke development, data pipelines, and technical strategy — engineered for growth across 15+ countries." />
    <meta name="keywords" content="custom software development, AI engineering, process automation, bespoke software, AI agents, workflow automation, technical strategy, software agency, data pipeline, AI consulting" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="author" content="CritiCo" />
    <!-- UPDATE: Replace with your production domain -->
    <link rel="canonical" href="https://critico.dev/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://critico.dev/" />
    <meta property="og:title" content="CritiCo | Bespoke Software & AI Engineering" />
    <meta property="og:description" content="We build high-performance custom software and intelligent AI systems for high-growth teams. Process automation, bespoke development, and data pipelines — engineered for scale." />
    <meta property="og:image" content="https://critico.dev/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="CritiCo" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@critico" />
    <meta name="twitter:title" content="CritiCo | Bespoke Software & AI Engineering" />
    <meta name="twitter:description" content="High-performance custom software and intelligent AI systems for high-growth teams. Serving clients across 15+ countries." />
    <meta name="twitter:image" content="https://critico.dev/assets/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Structured Data: Organization + WebSite + WebPage + FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://critico.dev/#organization",
          "name": "CritiCo",
          "url": "https://critico.dev",
          "logo": "https://critico.dev/assets/critico.svg",
          "description": "Bespoke software engineering and AI systems for high-growth teams. CritiCo builds custom software, process automation pipelines, and intelligent AI agents that scale businesses worldwide.",
          "areaServed": "Worldwide",
          "numberOfEmployees": {
            "@type": "QuantitativeValue",
            "value": "10-50"
          },
          "knowsAbout": [
            "Custom Software Development",
            "AI Engineering",
            "Process Automation",
            "Data Pipeline Architecture",
            "Technical Strategy",
            "AI Agent Development"
          ],
          "hasOfferCatalog": {
            "@type": "OfferCatalog",
            "name": "Software Engineering Services",
            "itemListElement": [
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Process Automation",
                  "description": "Intelligent workflow automation and real-time system integration for business operations"
                }
              },
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Bespoke Software Development",
                  "description": "Custom web and mobile applications engineered to specific business requirements"
                }
              },
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Autonomous AI Agent Development",
                  "description": "Custom AI support agents using retrieval-augmented generation for 24/7 automated operations"
                }
              },
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Technical Strategy & Consulting",
                  "description": "Digital transformation roadmaps, architectural audits, and AI implementation planning"
                }
              },
              {
                "@type": "Offer",
                "itemOffered": {
                  "@type": "Service",
                  "name": "Data & Workflow Automation",
                  "description": "Cross-platform data pipelines, automated reporting, and unified data ecosystem management"
                }
              }
            ]
          },
          "aggregateRating": {
            "@type": "AggregateRating",
            "ratingValue": "5.0",
            "reviewCount": "40",
            "bestRating": "5"
          }
        },
        {
          "@type": "WebSite",
          "@id": "https://critico.dev/#website",
          "url": "https://critico.dev",
          "name": "CritiCo",
          "description": "Bespoke Software & AI Engineering for High-Growth Teams",
          "publisher": {
            "@id": "https://critico.dev/#organization"
          },
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://critico.dev/?s={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "WebPage",
          "@id": "https://critico.dev/#webpage",
          "url": "https://critico.dev",
          "name": "CritiCo | Bespoke Software & AI Engineering for High-Growth Teams",
          "isPartOf": { "@id": "https://critico.dev/#website" },
          "about": { "@id": "https://critico.dev/#organization" },
          "description": "CritiCo builds high-performance custom software and intelligent AI systems for scaling businesses. Process automation, bespoke development, data pipelines — serving clients across 15+ countries with a 99% client satisfaction rate."
        },
        {
          "@type": "FAQPage",
          "@id": "https://critico.dev/#faqpage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "Why should I build custom software instead of using a subscription tool?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Subscription tools are great for starting, but they often become a 'feature prison' as you grow. Bespoke software eliminates monthly per-user fees and gives you 100% control over the roadmap — meaning the software fits your business, not the other way around."
              }
            },
            {
              "@type": "Question",
              "name": "What if I only have a rough idea and no technical specs?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "That's where most of our best projects start. We don't just write code; we help with product strategy. We'll work together to turn your vision into a clickable prototype and then a technical roadmap before a single line of production code is written."
              }
            },
            {
              "@type": "Question",
              "name": "Can CritiCo integrate with my existing data and systems?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Absolutely. Whether it's a legacy SQL database, a tangle of spreadsheets, or various third-party APIs, we specialize in building the 'glue' that makes disparate systems work together seamlessly."
              }
            },
            {
              "@type": "Question",
              "name": "How does CritiCo handle changes during the development process?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "We work in transparent 'sprints,' meaning you see progress every two weeks. If we discover a better way to do things mid-build, we pivot. You're never locked into a rigid plan that was made before the work even started."
              }
            },
            {
              "@type": "Question",
              "name": "Who owns the source code when the project is complete?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "You own 100% of the IP and source code. While we offer ongoing support and optimization, we build using industry-standard tools so any competent engineering team could take over if you ever decided to move in-house."
              }
            }
          ]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
